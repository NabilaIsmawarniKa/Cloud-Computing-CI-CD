<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikum Cloud Computing - Kelompok Ntahlah</title>
</head>
<body style="background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #1e293b; margin: 0; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 80vh;">

    <div style="background-color: #ffffff; max-width: 600px; width: 100%; padding: 32px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0;">
        
        <h2 style="color: #0f172a; margin-top: 0; margin-bottom: 8px; font-size: 24px; font-weight: 700;">Praktikum Cloud Computing</h2>
        <p style="color: #64748b; margin-top: 0; margin-bottom: 24px; font-size: 14px;">Kelompok: <span style="color: #6366f1; font-weight: 600;">Ntahlah</span></p>
        
        <hr style="border: 0; height: 1px; background-color: #e2e8f0; margin-bottom: 24px;">

        <h3 style="color: #334155; font-size: 16px; margin-bottom: 12px; font-weight: 600;">Daftar Anggota</h3>
        <table style="width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 15px;">
            <thead>
                <tr style="border-bottom: 2px solid #e2e8f0; text-align: left; color: #64748b;">
                    <th style="padding: 10px 0; font-weight: 500; width: 15%;">No</th>
                    <th style="padding: 10px 0; font-weight: 500;">Nama Lengkap</th>
                </tr>
            </thead>
            <tbody>
                <tr style="border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 12px 0; color: #94a3b8;">01</td>
                    <td style="padding: 12px 0; font-weight: 500;">Nabila Ismawarni KA</td>
                </tr>
                <tr style="border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 12px 0; color: #94a3b8;">02</td>
                    <td style="padding: 12px 0; font-weight: 500;">Kilala Mahadewi</td>
                </tr>
                <tr style="border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 12px 0; color: #94a3b8;">03</td>
                    <td style="padding: 12px 0; font-weight: 500;">Syahrul Ibnu R.</td>
                </tr>
            </tbody>
        </table>

        <div style="display: flex; justify-content: space-between; align-items: center; background-color: #f8fafc; padding: 16px; border-radius: 12px; border: 1px solid #f1f5f9;">
            
            <div style="display: flex; align-items: center;">
                <span style="height: 10px; width: 10px; background-color: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px;"></span>
                <span style="font-size: 14px; font-weight: 600; color: #1e293b;">Status CI/CD: <span style="color: #22c55e;">Ready to Test</span></span>
            </div>

            <button onclick="alert('Sistem Terverifikasi!\nKelompok: Ntahlah\nStatus: Ready to Test')" 
                    style="background-color: #6366f1; color: white; border: none; padding: 10px 16px; font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: background-color 0.2s;">
                Trigger Test
            </button>
            
        </div>

    </div>

</body>
</html>
