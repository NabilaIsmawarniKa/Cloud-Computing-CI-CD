name: Deploy ke Server

on:
  push:
    branches:
      - main  # ganti sesuai branch kamu

jobs:
  deploy:
    runs-on: self-hosted  # pakai runner di server kamu

    steps:
      - name: Checkout kode
        uses: actions/checkout@v3

      - name: Deploy website
        run: |
          rsync -av --exclude='.git' --exclude='.github' \
    $GITHUB_WORKSPACE/mywebntahlah/ /var/www/html/
deploy
